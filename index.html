<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3A5F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Site Visit">
<title>Atera Site Visit Capture</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    /* Atera Water brand palette */
    --navy:#1F3A5F;          /* primary dark — app bar / dark surfaces */
    --navy-deep:#113148;     /* deep navy — darkest surfaces */
    --teal:#1B8C9B;          /* primary accent — buttons, links, active */
    --teal-bright:#48C7D3;   /* bright accent — focus rings, highlights */
    --blue:#2C7AB5;          /* secondary accent — logo blue */
    --teal-d:#136B77;        /* darker teal — accent text on light */
    --teal-l:#48C7D3;        /* alias of bright accent */
    --teal-tint:#e7f5f7;     /* light teal fill (selected, slugbox) */
    --teal-tint-line:#b3e2e8;
    --navy-tint:#e9f0f8;     /* light blue fill */
    --bg:#eef2f5; --card:#ffffff; --ink:#16273d; --muted:#5d6b7e;
    --line:#e2e8f0; --danger:#dc2626; --danger-bg:#fef2f2;
    --warn-bg:#fffbeb; --warn-ink:#92400e; --warn-line:#fde68a;
    --radius:14px; --shadow:0 1px 3px rgba(17,49,72,.12),0 1px 2px rgba(17,49,72,.07);
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45;
    -webkit-text-size-adjust:100%;
  }
  button{font-family:inherit; font-size:16px; cursor:pointer}
  input,textarea,select{font-family:inherit; font-size:16px}
  a{color:var(--teal)}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--teal-bright); outline-offset:1px; border-color:var(--teal)}

  /* App bar */
  .appbar{
    position:sticky; top:0; z-index:20; background:var(--navy); color:#fff;
    padding:calc(10px + var(--safe-t)) 16px 10px; display:flex; align-items:center; gap:10px;
    box-shadow:var(--shadow);
  }
  .appbar .back{
    background:rgba(255,255,255,.15); border:0; color:#fff; width:38px; height:38px;
    border-radius:10px; font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center;
  }
  .appbar .back[hidden]{display:none}
  .appbar h1{font-size:17px; margin:0; font-weight:650; flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .appbar .sub{font-size:12px; opacity:.85; font-weight:400}
  .appbar .aa{background:rgba(255,255,255,.15); border:0; color:#fff; height:38px; min-width:42px;
    padding:0 10px; border-radius:10px; font-weight:700; flex:none; display:flex; align-items:baseline;
    justify-content:center; gap:1px}
  .appbar .aa .a1{font-size:18px} .appbar .aa .a2{font-size:12px}
  .ts-row{display:flex; align-items:center; justify-content:center; gap:14px; margin:6px 0 2px}
  .ts-val{min-width:84px; text-align:center; font-weight:700; font-size:18px; font-variant-numeric:tabular-nums}
  .ts-step{flex:0 0 64px; min-height:52px; font-size:20px}

  /* Layout */
  .wrap{max-width:560px; margin:0 auto; padding:16px 16px 140px}
  .screen{animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* Buttons */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:1px solid var(--line); background:#fff; color:var(--ink);
    border-radius:12px; padding:13px 16px; font-weight:600; min-height:50px;}
  .btn:active{transform:translateY(1px)}
  .btn.block{display:flex; width:100%}
  .btn.primary{background:var(--teal); border-color:var(--teal); color:#fff}
  .btn.big{min-height:60px; font-size:18px; border-radius:16px}
  .btn.ghost{background:#fff; color:var(--teal); border-color:#cbd5e1}
  .btn.subtle{background:#f1f5f9; border-color:#e2e8f0; color:#334155}
  .btn.danger{background:var(--danger-bg); border-color:#fecaca; color:var(--danger)}
  .btn[disabled]{opacity:.5}
  .btn-row{display:flex; gap:10px}
  .btn-row>.btn{flex:1}

  /* Cards */
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:14px; margin-bottom:12px}
  .card.tap{cursor:pointer}
  .card.tap:active{background:#f8fafc}
  .row{display:flex; gap:12px; align-items:center}
  .grow{flex:1; min-width:0}
  .muted{color:var(--muted)}
  .small{font-size:13px}
  .tiny{font-size:12px}
  .ellip{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .stack>*+*{margin-top:4px}

  .chip{display:inline-block; font-size:11px; font-weight:700; letter-spacing:.02em;
    padding:3px 9px; border-radius:999px; text-transform:uppercase}
  .chip.prog{background:var(--navy-tint); color:var(--blue)}
  .chip.done{background:#dcfce7; color:#166534}

  .section-title{font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase;
    letter-spacing:.04em; margin:18px 2px 8px}

  /* Forms */
  .field{margin-bottom:14px}
  .field label{display:block; font-size:13px; font-weight:600; color:#334155; margin-bottom:6px}
  .field input, .field textarea, .field select{
    width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:10px; background:#fff; color:var(--ink)}
  .field textarea{min-height:90px; resize:vertical}
  .field .hint{font-size:12px; color:var(--muted); margin-top:6px}
  .slugbox{font-family:ui-monospace,Menlo,monospace; font-size:13px; color:var(--teal);
    background:var(--teal-tint); border:1px dashed var(--teal-tint-line); border-radius:8px; padding:8px 10px; margin-top:6px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

  /* Entry log */
  .entry{display:flex; gap:12px}
  .entry .thumb{width:64px; height:64px; border-radius:10px; object-fit:cover; background:#e2e8f0; flex:none}
  .entry .thumb.vid{position:relative}
  .entry .ph{width:64px; height:64px; border-radius:10px; background:#f1f5f9; border:1px dashed #cbd5e1;
    display:flex; align-items:center; justify-content:center; font-size:24px; flex:none; color:#94a3b8}
  .entry .time{font-variant-numeric:tabular-nums; font-weight:700; font-size:13px; color:var(--teal)}
  .entry .cat{font-weight:600; font-size:14px}
  .entry .note{font-size:13px; color:#475569; margin-top:2px; white-space:pre-wrap; word-break:break-word}
  .entry .filemeta{font-size:11px; color:#94a3b8; font-family:ui-monospace,Menlo,monospace; margin-top:3px}
  .badge{display:inline-block; font-size:10px; font-weight:700; background:var(--navy-deep); color:#fff;
    padding:1px 6px; border-radius:6px; margin-left:6px; vertical-align:middle}
  .badge.geo{background:var(--blue)}
  .iconbtn{border:0; background:transparent; color:#94a3b8; font-size:18px; padding:6px; border-radius:8px}
  .iconbtn:active{background:#f1f5f9}

  /* Key-shot checklist + category groups */
  .ks-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px 12px}
  .ks{display:flex; align-items:center; gap:6px; font-size:12.5px; line-height:1.25}
  .ks span:first-child{font-weight:800; width:15px; text-align:center; flex:none}
  .ks.ok{color:var(--teal-d)} .ks.miss{color:var(--warn-ink); font-weight:600}
  .catgrp-label{font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase;
    letter-spacing:.04em; margin:14px 2px 6px}
  .catflag{font-size:13px; flex:none}

  /* Collapsible survey sections */
  .svhead{display:flex; align-items:center; gap:10px; width:100%; background:none; border:0;
    padding:15px 14px; font:inherit; color:inherit; text-align:left; cursor:pointer; min-height:54px}
  .svhead:active{background:#f8fafc}
  .svchev{flex:none; color:var(--muted); font-size:13px; width:14px; text-align:center}
  .svbody{padding:2px 14px 6px}

  /* Empty states */
  .empty{text-align:center; padding:48px 20px; color:var(--muted)}
  .empty .em{font-size:40px; display:block; margin-bottom:10px}

  /* Sticky bottom bar */
  .actionbar{position:fixed; left:0; right:0; bottom:0; z-index:15;
    background:rgba(255,255,255,.96); backdrop-filter:blur(8px);
    border-top:1px solid var(--line); padding:10px 16px calc(10px + var(--safe-b));
    box-shadow:0 -2px 10px rgba(15,23,42,.05)}
  .actionbar .inner{max-width:560px; margin:0 auto; display:flex; flex-direction:column; gap:8px}

  /* Banner */
  .banner{background:var(--warn-bg); border:1px solid var(--warn-line); color:var(--warn-ink);
    border-radius:12px; padding:12px 14px; font-size:13px; display:flex; gap:10px; align-items:flex-start}
  .banner .b-ic{font-size:18px; line-height:1}

  /* Bottom sheet (tag) */
  .overlay{position:fixed; inset:0; z-index:40; background:rgba(15,23,42,.45);
    display:flex; align-items:flex-end; justify-content:center; animation:fade .15s ease}
  .sheet{background:#fff; width:100%; max-width:560px; border-radius:18px 18px 0 0;
    max-height:92vh; overflow:auto; padding:16px 16px calc(16px + var(--safe-b));
    box-shadow:0 -8px 30px rgba(0,0,0,.25); animation:slideup .22s ease}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet h2{margin:2px 0 12px; font-size:18px}
  .grabber{width:40px; height:4px; background:#cbd5e1; border-radius:2px; margin:0 auto 12px}
  .preview{width:100%; max-height:240px; object-fit:contain; border-radius:12px; background:var(--navy-deep); margin-bottom:14px}
  .cat-list{display:flex; flex-direction:column; gap:8px; margin-bottom:6px}
  .cat-btn{text-align:left; border:1px solid #cbd5e1; background:#fff; border-radius:12px;
    padding:13px 14px; font-size:15px; min-height:50px; display:flex; align-items:center; gap:10px}
  .cat-btn .dot{width:10px; height:10px; border-radius:50%; border:2px solid #cbd5e1; flex:none}
  .cat-btn.sel{border-color:var(--teal); background:var(--teal-tint); color:var(--teal-d); font-weight:600}
  .cat-btn.sel .dot{border-color:var(--teal); background:var(--teal)}

  /* Sign-in: role picker + numeric PIN pad (mirrors the Tasks app) */
  .role-pick{display:flex; flex-direction:column; gap:10px}
  .role-btn{display:flex; align-items:center; gap:14px; width:100%; text-align:left; font:inherit; color:inherit;
    padding:14px 16px; border:1px solid #e2e8f0; border-radius:14px; background:#fff; cursor:pointer}
  .role-btn:active{transform:translateY(1px); background:#f8fafc}
  .role-emoji{font-size:24px; line-height:1; flex:none}
  .role-text{display:flex; flex-direction:column; gap:2px; min-width:0}
  .role-name{font-weight:700; font-size:16px; color:var(--navy)}
  .role-desc{color:var(--muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .role-go{margin-left:auto; color:var(--teal); font-size:20px; flex:none}
  .pin-back{background:none; border:0; color:var(--muted); font-weight:600; font-size:13px; padding:4px 2px; cursor:pointer}
  .pin-input{width:100%; text-align:center; letter-spacing:12px; font-size:26px;
    padding:14px; border:1px solid #e2e8f0; border-radius:12px; background:#f8fafc; caret-color:transparent; cursor:default}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px}
  .key{padding:16px 0; font-size:22px; font-weight:600; border-radius:14px; background:#fff;
    border:1px solid #e2e8f0; color:var(--navy); cursor:pointer; transition:background .1s, transform .05s}
  .key:active{transform:scale(.96); background:#f1f5f9}
  .key-sub{color:var(--muted); font-size:18px}
  .key-go{background:var(--teal); color:#fff; border-color:var(--teal); font-size:24px}
  .key[disabled]{opacity:.6}
  .auth-error{background:var(--danger-bg); color:var(--danger); padding:10px 12px; border-radius:8px; margin-top:12px; font-size:13px}

  /* Bullet list editor */
  .bullets .brow{display:flex; gap:8px; margin-bottom:8px}
  .bullets .brow input{flex:1}

  /* Toast */
  .toast{position:fixed; left:50%; bottom:calc(96px + var(--safe-b)); transform:translateX(-50%);
    background:var(--navy-deep); color:#fff; padding:10px 16px; border-radius:999px; font-size:14px; z-index:60;
    box-shadow:0 6px 20px rgba(0,0,0,.3); animation:fade .15s ease; max-width:90%}
  .install-hint{font-size:12px; color:var(--muted); text-align:center; margin-top:14px; padding:0 8px}
</style>
<script>/* apply saved per-device text size early to avoid flash */
try{var _z=parseFloat(localStorage.getItem('atera-ui-scale'));if(_z>0&&_z!==1)document.documentElement.style.zoom=_z;}catch(e){}</script>

<body>
<div class="appbar">
  <button class="back" id="backBtn" hidden>‹</button>
  <div class="grow">
    <h1 id="barTitle">Site Visits</h1>
    <div class="sub" id="barSub">Atera Water · field capture</div>
  </div>
  <button class="aa" id="aaBtn" aria-label="Text size"><span class="a1">A</span><span class="a2">A</span></button>
</div>

<div id="app"></div>

<!-- hidden native camera inputs -->
<input id="photoInput" type="file" accept="image/*" capture="environment" hidden>
<input id="videoInput" type="file" accept="video/*" capture="environment" hidden>

<script>
"use strict";
/* ============================================================
   Atera Water — Site Visit Capture (offline-first PWA)
   Single-file. No deps. All capture/storage/zip on-device.
   ============================================================ */

/* ---------- tiny DOM helpers ---------- */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const app = $('#app');
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }

/* ---------- guided categories ---------- */
/* KEY shots — should always have a photo/video; missing ones are flagged as a reminder */
const KEY_CATEGORIES = [
  'Feed or source tank',
  'Product tank',
  'Reject or discharge point',
  'Access route for equipment',
  'Proposed installation location',
  'Power supply location'
];
const OTHER_CATEGORIES = [
  'Existing treatment equipment',
  'Power supply',
  'Water quality report',
  'Other'
];
const CATEGORIES = [...KEY_CATEGORIES, ...OTHER_CATEGORIES];
const OTHER = 'Other';

/* Which key shots have at least one photo/video? Returns [{cat, done}] for the reminder. */
function keyShotsCovered(entries){
  const have = new Set(entries.filter(e=>e.mediaType).map(e=>e.category));
  return KEY_CATEGORIES.map(c=>({cat:c, done:have.has(c)}));
}

/* ---------- staff (dropdown options — add names here as the team grows) ---------- */
const STAFF = ['Adrian'];

/* ---------- site survey — engineer fills in on site (stored as JSONB, no DB migration) ----------
   Field shapes: {k,label} text · {…,ml:true} textarea · {…,num:true} numeric keypad · {…,sel:[...]} dropdown */
const SURVEY = [
  { group:'Pre-visit information', items:[
    {k:'project_name',      label:'Project name'},
    {k:'project_type',      label:'Type of project', sel:['Equipment Sales','Water as a Service']},
    {k:'pic_name',          label:'PIC name'},
    {k:'pic_role',          label:'PIC role'},
    {k:'deadline',          label:'Target commissioning date'},
    {k:'budget',            label:'Does the budget exist?'},
    {k:'problem_statement', label:'Customer problem statement', ml:true}
  ]},
  { group:'Water source', items:[
    {k:'source_type',  label:'Source type — borewell / municipal / surface / sea / recycled'},
    {k:'tds',          label:'On-site test — TDS'},
    {k:'turbidity',    label:'On-site test — Turbidity'},
    {k:'reliability',  label:'Water source reliability', ml:true}
  ]},
  { group:'Demand and duty', items:[
    {k:'flow_m3day',          label:'Total flow required (m³/day)', num:true},
    {k:'flow_m3hr',           label:'Total flow required (m³/hr)', num:true},
    {k:'operating_days_week', label:'No. of operating days per week', num:true},
    {k:'hours_weekday',       label:'Hours of operation per day (weekday)', num:true},
    {k:'hours_sat',           label:'Hours of operation per day (Sat)', num:true},
    {k:'hours_sun',           label:'Hours of operation per day (Sun)', num:true},
    {k:'end_use',             label:'End use (drinking, boiler, process, cooling, domestic)'}
  ]},
  { group:'Site layout', items:[
    {k:'footprint',           label:'Available footprint — L × W × H (m)'},
    {k:'dist_feed_plant',     label:'Distance — Feed → Plant (m)', num:true},
    {k:'dist_plant_product',  label:'Distance — Plant → Product (m)', num:true},
    {k:'dist_plant_discharge',label:'Distance — Plant → Discharge (m)', num:true},
    {k:'dist_plant_power',    label:'Distance — Plant → Power (m)', num:true},
    {k:'pipe_routing',        label:'Pipe routing constraints (overhead / trench / existing services)', ml:true}
  ]}
];
const SURVEY_FIELDS = SURVEY.flatMap(g=>g.items);
function surveyFilled(visit){ const s=visit.survey||{}; return SURVEY_FIELDS.filter(f=>(s[f.k]||'').trim()).length; }

/* ---------- slug + filename helpers ---------- */
function slugify(s){
  return String(s||'').toLowerCase().trim()
    .replace(/['’`]/g,'')
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'')
    .slice(0,60) || 'visit';
}
function catSlug(label){ return slugify(label).slice(0,40) || 'entry'; }
function pad2(n){ return String(n).padStart(2,'0'); }
function nowHM(){ const d=new Date(); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function hhmm(t){ return String(t||'').replace(':',''); }
function shortId(){
  const a=new Uint8Array(4); crypto.getRandomValues(a);
  return [...a].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function extFor(mime, mediaType, name){
  const map={'image/jpeg':'jpg','image/jpg':'jpg','image/png':'png','image/heic':'heic',
    'image/heif':'heif','image/webp':'webp','image/gif':'gif',
    'video/mp4':'mp4','video/quicktime':'mov','video/webm':'webm','video/3gpp':'3gp'};
  if(map[mime]) return map[mime];
  if(name && name.includes('.')){ const e=name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g,''); if(e) return e; }
  return mediaType==='video' ? 'mp4' : 'jpg';
}
function entryFilename(e){
  if(!e.mediaType) return null;
  return `${hhmm(e.time)}-${e.categorySlug||'entry'}-${e.shortid}.${e.ext}`;
}
function folderName(visit){ return `${visit.date}-${slugify(visit.company)}`; }

/* ---------- IndexedDB layer ---------- */
const DB_NAME='atera-site-visits', DB_VER=1;
let _dbp=null;
function openDB(){
  if(_dbp) return _dbp;
  _dbp=new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded=()=>{
      const db=r.result;
      if(!db.objectStoreNames.contains('visits')) db.createObjectStore('visits',{keyPath:'id'});
      if(!db.objectStoreNames.contains('entries')){
        const s=db.createObjectStore('entries',{keyPath:'id'}); s.createIndex('visitId','visitId',{unique:false});
      }
      if(!db.objectStoreNames.contains('blobs')) db.createObjectStore('blobs',{keyPath:'id'});
    };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
  return _dbp;
}
function tx(store, mode){ return openDB().then(db=>db.transaction(store,mode).objectStore(store)); }
const reqP = req => new Promise((res,rej)=>{ req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); });
async function dbPut(store,val){ const s=await tx(store,'readwrite'); await reqP(s.put(val)); return val; }
async function dbGet(store,key){ const s=await tx(store,'readonly'); return reqP(s.get(key)); }
async function dbGetAll(store){ const s=await tx(store,'readonly'); return reqP(s.getAll()); }
async function dbDelete(store,key){ const s=await tx(store,'readwrite'); return reqP(s.delete(key)); }
async function entriesFor(visitId){
  const s=await tx('entries','readonly');
  const all=await reqP(s.index('visitId').getAll(visitId));
  return all.sort(byTime);
}
function byTime(a,b){
  const ma=tmin(a.time), mb=tmin(b.time);
  if(ma!==mb) return ma-mb;
  return (a.seq||0)-(b.seq||0);
}
function tmin(t){ const m=/^(\d{1,2}):(\d{2})/.exec(t||''); return m? (+m[1])*60+(+m[2]) : 1e9; }
const uuid = ()=> (crypto.randomUUID? crypto.randomUUID() : 'x'+shortId()+shortId());

// total on-device size of a visit's media (≈ final store-only zip size)
async function visitSize(visitId){
  const entries=await entriesFor(visitId);
  let bytes=0, media=0;
  for(const e of entries){ if(e.filename){ const rec=await dbGet('blobs', e.id); if(rec&&rec.blob){ bytes+=rec.blob.size; media++; } } }
  return { bytes, media };
}
function fmtSize(b){ const u=['B','KB','MB','GB']; let i=0, n=b||0;
  while(n>=1024 && i<u.length-1){ n/=1024; i++; }
  return (i===0||n>=10 ? Math.round(n) : n.toFixed(1))+' '+u[i]; }
const SIZE_WARN = 1024*1024*1024; // 1 GB — caution before WhatsApp's 2 GB doc limit / phone-memory limits

/* ---------- record helpers ---------- */
async function createVisit({date,company,engineer,location,geo}){
  const v={ id:uuid(), date, company, engineer:engineer||'', location:location||'', geo:geo||null,
    status:'in-progress', keyFindings:[], outstanding:[], exported:false,
    createdAt:Date.now(), updatedAt:Date.now() };
  await dbPut('visits',v); return v;
}
async function saveEntry(visitId, data){
  // data: {id?, time, category, note, mediaType, blob?, mime?, originalName?, geo?, shortid?, ext?}
  const existing = data.id ? await dbGet('entries', data.id) : null;
  const e = existing || { id:uuid(), visitId, seq:Date.now() };
  e.time = data.time || e.time || nowHM();
  e.category = data.category || OTHER;
  e.categorySlug = catSlug(e.category===OTHER ? (data.category||'other') : e.category);
  e.note = (data.note||'').trim();
  e.geo = data.geo!==undefined ? data.geo : (e.geo||null);
  if(data.mediaType){
    e.mediaType = data.mediaType;
    e.shortid = e.shortid || data.shortid || shortId();
    if(data.blob){ e.ext = extFor(data.mime||data.blob.type, data.mediaType, data.originalName);
      await dbPut('blobs',{id:e.id, blob:data.blob}); }
    else if(data.ext){ e.ext = data.ext; }
  } else if(data.mediaType===null){ e.mediaType=null; }
  e.filename = entryFilename(e);
  await dbPut('entries', e);
  await touchVisit(visitId);
  return e;
}
async function deleteEntry(id){ await dbDelete('entries',id); await dbDelete('blobs',id); }
async function touchVisit(id){ const v=await dbGet('visits',id); if(v){ v.updatedAt=Date.now(); await dbPut('visits',v); } }
async function deleteVisit(id){
  const es=await entriesFor(id);
  for(const e of es){ await dbDelete('blobs',e.id); await dbDelete('entries',e.id); }
  await dbDelete('visits',id);
}

/* ---------- markdown builder (matches site-visits/ format) ---------- */
function buildMarkdown(visit, entries){
  const L=[];
  L.push(`# Site Visit — ${visit.company||'Untitled'}`);
  L.push(`**Date:** ${visit.date}`);
  if(visit.location) L.push(`**Location:** ${visit.location}`);
  if(visit.geo) L.push(`**Map:** https://maps.apple.com/?q=${visit.geo.lat},${visit.geo.lng}`);
  if(visit.engineer) L.push(`**Staff:** ${visit.engineer}`);
  // Site survey (checklist items 6–19) — only the filled-in fields
  const sv=visit.survey||{};
  const svGroups=SURVEY.map(g=>({g:g.group, items:g.items.filter(it=>(sv[it.k]||'').trim())})).filter(x=>x.items.length);
  if(svGroups.length){
    L.push(''); L.push('---'); L.push(''); L.push('## Site Survey');
    for(const grp of svGroups){
      L.push(''); L.push(`### ${grp.g}`);
      for(const it of grp.items) L.push(`- **${it.label}:** ${sv[it.k].trim().replace(/\r?\n+/g,' ')}`);
    }
  }
  L.push(''); L.push('---'); L.push(''); L.push('## Notes'); L.push('');
  for(const e of entries){
    L.push(`### ${e.time} — ${e.category}`);
    if(e.note){ for(const ln of e.note.split(/\r?\n/)){ const t=ln.trim(); if(t) L.push(`- ${t}`); } }
    if(e.filename){ const verb = e.mediaType==='video' ? 'Video saved' : 'Photo saved';
      L.push(`- ${verb}: \`${e.filename}\``); }
    if(e.geo) L.push(`- GPS: ${e.geo.lat.toFixed(5)}, ${e.geo.lng.toFixed(5)}`);
    L.push('');
  }
  L.push('---'); L.push(''); L.push('## Visit Summary');
  L.push('### Key Findings');
  const kf=(visit.keyFindings||[]).map(s=>s.trim()).filter(Boolean);
  if(kf.length) kf.forEach(b=>L.push(`- ${b}`)); else L.push('- ');
  L.push('### Outstanding');
  const os=(visit.outstanding||[]).map(s=>s.trim()).filter(Boolean);
  if(os.length) os.forEach(b=>L.push(`- ${b}`)); else L.push('- ');
  L.push('');
  return L.join('\n');
}

/* ---------- store-only ZIP writer (no deps, no compression) ---------- */
const CRC_TABLE=(()=>{ const t=new Uint32Array(256);
  for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; }
  return t; })();
function crc32(u8){ let c=0xFFFFFFFF; for(let i=0;i<u8.length;i++) c=CRC_TABLE[(c^u8[i])&0xFF]^(c>>>8); return (c^0xFFFFFFFF)>>>0; }
function dosDT(d){
  const time=(d.getHours()<<11)|(d.getMinutes()<<5)|(d.getSeconds()>>1);
  const date=((d.getFullYear()-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate();
  return {time:time&0xFFFF, date:date&0xFFFF};
}
function makeZip(files){
  // files: [{name, data:Uint8Array, date?:Date}]
  const enc=new TextEncoder(); const parts=[]; const central=[]; let offset=0;
  const now=new Date();
  for(const f of files){
    const nameBytes=enc.encode(f.name); const data=f.data||new Uint8Array(0);
    const crc=crc32(data); const {time,date}=dosDT(f.date||now);
    const h=new Uint8Array(30+nameBytes.length); const dv=new DataView(h.buffer);
    dv.setUint32(0,0x04034b50,true); dv.setUint16(4,20,true); dv.setUint16(6,0x0800,true);
    dv.setUint16(8,0,true); dv.setUint16(10,time,true); dv.setUint16(12,date,true);
    dv.setUint32(14,crc,true); dv.setUint32(18,data.length,true); dv.setUint32(22,data.length,true);
    dv.setUint16(26,nameBytes.length,true); dv.setUint16(28,0,true); h.set(nameBytes,30);
    parts.push(h, data);
    central.push({nameBytes,crc,size:data.length,time,date,offset,dir:f.name.endsWith('/')});
    offset += h.length + data.length;
  }
  const cdStart=offset; const cdParts=[]; let cdSize=0;
  for(const c of central){
    const h=new Uint8Array(46+c.nameBytes.length); const dv=new DataView(h.buffer);
    dv.setUint32(0,0x02014b50,true); dv.setUint16(4,20,true); dv.setUint16(6,20,true);
    dv.setUint16(8,0x0800,true); dv.setUint16(10,0,true); dv.setUint16(12,c.time,true);
    dv.setUint16(14,c.date,true); dv.setUint32(16,c.crc,true); dv.setUint32(20,c.size,true);
    dv.setUint32(24,c.size,true); dv.setUint16(28,c.nameBytes.length,true);
    dv.setUint16(30,0,true); dv.setUint16(32,0,true); dv.setUint16(34,0,true);
    dv.setUint16(36,0,true); dv.setUint32(38, c.dir?0x10:0x20, true); dv.setUint32(42,c.offset,true);
    h.set(c.nameBytes,46); cdParts.push(h); cdSize+=h.length;
  }
  const eocd=new Uint8Array(22); const dv=new DataView(eocd.buffer);
  dv.setUint32(0,0x06054b50,true); dv.setUint16(8,central.length,true);
  dv.setUint16(10,central.length,true); dv.setUint32(12,cdSize,true); dv.setUint32(16,cdStart,true);
  return new Blob([...parts,...cdParts,eocd],{type:'application/zip'});
}
const blobBytes = async b => new Uint8Array(await b.arrayBuffer());

/* ---------- export ---------- */
async function buildVisitZip(visitId){
  const visit=await dbGet('visits',visitId);
  const entries=await entriesFor(visitId);
  const folder=folderName(visit);
  const md=buildMarkdown(visit, entries);
  const files=[ {name:folder+'/'}, {name:`${folder}/notes.md`, data:new TextEncoder().encode(md)} ];
  for(const e of entries){
    if(!e.filename) continue;
    const rec=await dbGet('blobs', e.id);
    if(!rec||!rec.blob) continue;
    files.push({name:`${folder}/${e.filename}`, data:await blobBytes(rec.blob), date:new Date(e.seq)});
  }
  return {visit, folder, zip:makeZip(files)};
}
async function exportVisit(visitId){
  const {visit, folder, zip}=await buildVisitZip(visitId);
  const fname=`${folder}.zip`;
  visit.status='completed'; visit.exported=true; visit.updatedAt=Date.now();
  await dbPut('visits',visit);
  const file=new File([zip], fname, {type:'application/zip'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file], title:`Site Visit — ${visit.company}`,
        text:`Atera site visit: ${folder}`});
      return {shared:true};
    }catch(err){ if(err && err.name==='AbortError') return {aborted:true}; }
  }
  // fallback: download
  const url=URL.createObjectURL(zip); const a=document.createElement('a');
  a.href=url; a.download=fname; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  return {downloaded:true};
}

const state={ screen:'home', visitId:null, urls:[] };
function freeUrls(){ state.urls.forEach(u=>URL.revokeObjectURL(u)); state.urls=[]; }
function objUrl(blob){ const u=URL.createObjectURL(blob); state.urls.push(u); return u; }

function setBar(title, sub, showBack){
  $('#barTitle').textContent=title;
  $('#barSub').textContent=sub||'';
  $('#backBtn').hidden=!showBack;
}
function go(screen, visitId){ state.screen=screen; if(visitId!==undefined) state.visitId=visitId; render(); }

async function render(){
  freeUrls();
  if(state.screen==='home') return renderHome();
  if(state.screen==='cover') return renderCover();
  if(state.screen==='capture') return renderCapture();
  if(state.screen==='survey') return renderSurvey();
  if(state.screen==='summary') return renderSummary();
  if(state.screen==='team') return renderTeam();
  if(state.screen==='teamVisit') return renderTeamVisit();
  renderHome();
}

function handleFile(input, mediaType){
  const f=input.files && input.files[0];
  input.value='';
  if(!f) return;
  pendingMedia={ blob:f, mediaType, mime:f.type, name:f.name };
  openSheet(pendingMedia, null);
}
$('#photoInput').addEventListener('change', e=>handleFile(e.target,'photo'));

/* ---------- Tag sheet (modal) ---------- */
function openSheet(media, editEntry){
  // media: pending {blob,mediaType,...} for new media entry; editEntry: existing entry to edit
  let selCat = editEntry ? editEntry.category : '';
  let geo = editEntry ? (editEntry.geo||null) : null;
  const isEdit=!!editEntry;
  const time = editEntry ? editEntry.time : nowHM();
  const note = editEntry ? editEntry.note : '';
  const KNOWN_CATS = [...KEY_CATEGORIES, ...OTHER_CATEGORIES.filter(c=>c!==OTHER)];
  const isCustom = !!selCat && !KNOWN_CATS.includes(selCat);   // legacy 'Other' or any free-text label
  const customVal = isCustom ? selCat : '';

  let previewHtml='';
  if(media){
    const url=objUrl(media.blob);
    previewHtml = media.mediaType==='video'
      ? `<video class="preview" src="${url}" controls playsinline></video>`
      : `<img class="preview" src="${url}" alt="preview">`;
  }else if(isEdit && editEntry.mediaType){
    previewHtml=`<div class="banner" style="margin-bottom:12px"><span class="b-ic">${editEntry.mediaType==='video'?'🎬':'🖼'}</span><div>Media kept: <code>${esc(editEntry.filename||'')}</code></div></div>`;
  }

  const opt = c => `<option value="${esc(c)}"${c===selCat?' selected':''}>${esc(c)}</option>`;
  const catSelect = `<select id="s_cat" class="cat-select">
      <option value=""${!selCat?' selected':''}>— select —</option>
      <optgroup label="📷 Key Shots — needs a photo/video">${KEY_CATEGORIES.map(opt).join('')}</optgroup>
      <optgroup label="Other Shots">${OTHER_CATEGORIES.filter(c=>c!==OTHER).map(opt).join('')}</optgroup>
      <optgroup label="Custom Shots"><option value="__custom__"${isCustom?' selected':''}>Custom…</option></optgroup>
    </select>`;

  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="sheet" role="dialog" aria-modal="true">
    <div class="grabber"></div>
    <h2>${isEdit?'Edit entry':(media?'Tag this '+(media.mediaType==='video'?'video':'photo'):'New note')}</h2>
    ${previewHtml}
    <div class="field"><label>What is this?</label>${catSelect}</div>
    <div class="field" id="otherWrap" style="${isCustom?'':'display:none'};margin-top:2px">
      <label>Custom shot label</label><input id="s_other" type="text" placeholder="Describe this shot" value="${esc(customVal)}">
    </div>
    <div class="field"><label>Note</label><textarea id="s_note" placeholder="Observations, labels, specs… (one line per bullet)">${esc(note)}</textarea></div>
    <button class="btn subtle block" id="s_geo" style="margin-bottom:14px">📍 ${geo?`GPS added (${geo.lat.toFixed(4)}, ${geo.lng.toFixed(4)})`:'Add GPS location (optional)'}</button>
    <div class="btn-row">
      <button class="btn subtle" id="s_cancel">Cancel</button>
      <button class="btn primary" id="s_save" style="flex:2">${isEdit?'Save changes':'Save entry'}</button>
    </div>
  </div>`;
  document.body.appendChild(ov);

  const close=()=>{ ov.remove(); pendingMedia=null; };
  ov.addEventListener('click', e=>{ if(e.target===ov) close(); });
  $('#s_cancel',ov).onclick=close;

  const catSel=$('#s_cat',ov);
  catSel.onchange=()=>{
    const custom = catSel.value==='__custom__';
    $('#otherWrap',ov).style.display = custom?'':'none';
    if(custom) $('#s_other',ov).focus();
  };

  $('#s_geo',ov).onclick=()=>{
    if(!navigator.geolocation){ toast('Geolocation not available'); return; }
    const btn=$('#s_geo',ov); btn.textContent='📍 Locating…';
    navigator.geolocation.getCurrentPosition(
      p=>{ geo={lat:p.coords.latitude,lng:p.coords.longitude}; btn.textContent=`📍 GPS added (${geo.lat.toFixed(4)}, ${geo.lng.toFixed(4)})`; },
      ()=>{ btn.textContent='📍 Add GPS location (optional)'; toast('Location unavailable'); },
      {enableHighAccuracy:true, timeout:8000, maximumAge:60000}
    );
  };

  $('#s_save',ov).onclick=async()=>{
    let category=catSel.value;
    if(category==='__custom__'){ category=$('#s_other',ov).value.trim()||'Custom'; }
    const noteVal=$('#s_note',ov).value.trim();
    if(!category && !noteVal && !media && !(isEdit && editEntry.mediaType)){ toast('Pick a category or add a note'); return; }
    if(!category) category='Other';
    const data={ id:isEdit?editEntry.id:undefined, time:time,
      category, note:noteVal, geo };
    if(media){ data.mediaType=media.mediaType; data.blob=media.blob; data.mime=media.mime; data.originalName=media.name; }
    await saveEntry(state.visitId, data);
    close();
    toast(isEdit?'Updated ✓':'Saved ✓');
    renderCapture();
  };
}

const SCALE_KEY='atera-ui-scale';
const clampScale=s=>Math.min(1.3,Math.max(0.7,Math.round(s*100)/100));
function getScale(){ const s=parseFloat(localStorage.getItem(SCALE_KEY)); return (s>0)?clampScale(s):1; }
function applyScale(s){ document.documentElement.style.zoom = (s===1?'':s); }
function saveScale(s){ try{ s===1?localStorage.removeItem(SCALE_KEY):localStorage.setItem(SCALE_KEY,String(s)); }catch(e){} }
function openTextSize(){
  let s=getScale();
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="sheet">
    <div class="grabber"></div>
    <h2>Text size</h2>
    <div class="ts-row">
      <button class="btn subtle ts-step" id="tsDown">A−</button>

      <button class="btn subtle ts-step" id="tsUp">A+</button>
    </div>
    <p class="small muted" style="text-align:center;margin:10px 4px 4px">Saved on this device only — other engineers' phones aren't affected.</p>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn ghost" id="tsReset">Reset (100%)</button>
      <button class="btn primary" id="tsDone">Done</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const fmt=()=>{ $('#tsVal').textContent=Math.round(s*100)+'%'; };
  const set=ns=>{ s=clampScale(ns); applyScale(s); fmt(); };
  set(s);
  $('#tsDown').onclick=()=>set(s-0.05);
  $('#tsUp').onclick=()=>set(s+0.05);
  $('#tsReset').onclick=()=>set(1);
  const close=()=>{ saveScale(s); ov.remove(); };
  $('#tsDone').onclick=close;
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
}

const CLOUD = {
  url: 'https://cinxpggjqrunbbuoaosg.supabase.co',

  bucket: 'site-visit-media',

  // passwords live in Supabase Auth (typed at runtime), never in code.

    staff:      { email: 'awstaff@aterawater.com',      label: 'AW Staff' }
  },
  version: 'v16'
};
const SESS_KEY='atera-cloud-session', DEV_KEY='atera-device-id', ROLE_KEY='atera-cloud-role';
function getRole(){ const r=localStorage.getItem(ROLE_KEY); return r&&CLOUD.accounts[r]?r:null; }
function setRole(r){ if(r&&CLOUD.accounts[r]) localStorage.setItem(ROLE_KEY,r); }
function roleLabel(){ const r=getRole(); return r?CLOUD.accounts[r].label:'the team'; }
function deviceId(){ let d=localStorage.getItem(DEV_KEY); if(!d){ d=uuid(); localStorage.setItem(DEV_KEY,d); } return d; }
function getSession(){ try{ return JSON.parse(localStorage.getItem(SESS_KEY)||'null'); }catch(e){ return null; } }
function setSession(s){ localStorage.setItem(SESS_KEY, JSON.stringify(s)); }
function clearSession(){ localStorage.removeItem(SESS_KEY); }
function cloudEnabled(){ return !!getSession(); }
function _stash(j){ setSession({ access_token:j.access_token, refresh_token:j.refresh_token,
  expires_at: j.expires_at ? j.expires_at*1000 : Date.now()+((j.expires_in||3600)*1000) }); }
async function cloudLogin(password, role){
  const key=CLOUD.accounts[role]?role:'management';
  const r=await fetch(`${CLOUD.url}/auth/v1/token?grant_type=password`,{ method:'POST',
    headers:{ apikey:CLOUD.key, 'Content-Type':'application/json' }, body:JSON.stringify({ email:CLOUD.accounts[key].email, password }) });
  const j=await r.json().catch(()=>({}));
  if(!r.ok || !j.access_token) throw new Error(j.error_description||j.msg||('Sign-in failed ('+r.status+')'));
  _stash(j); setRole(key); return true;
}
async function cloudRefresh(){
  const s=getSession(); if(!s||!s.refresh_token) return null;
  const r=await fetch(`${CLOUD.url}/auth/v1/token?grant_type=refresh_token`,{ method:'POST',
    headers:{ apikey:CLOUD.key, 'Content-Type':'application/json' }, body:JSON.stringify({ refresh_token:s.refresh_token }) });
  const j=await r.json().catch(()=>({}));
  if(!r.ok || !j.access_token){ clearSession(); return null; }
  _stash(j); return j.access_token;
}
async function cloudToken(){
  const s=getSession(); if(!s) return null;
  if(Date.now() < (s.expires_at - 60000)) return s.access_token;
  return await cloudRefresh();
}
async function _ah(){ const t=await cloudToken(); if(!t) throw new Error('Not signed in'); return { apikey:CLOUD.key, Authorization:`Bearer ${t}` }; }
function cloudSignOut(){ clearSession(); localStorage.removeItem(ROLE_KEY); toast('Signed out'); go('home'); }

async function cloudUpload(path, blob){
  const r=await fetch(`${CLOUD.url}/storage/v1/object/${CLOUD.bucket}/${encodeURI(path)}`,{
    method:'POST', headers:{ ...(await _ah()), 'Content-Type':blob.type||'application/octet-stream' }, body:blob });
  if(!r.ok && r.status!==409) throw new Error('upload '+r.status+' '+(await r.text()).slice(0,120));
}
async function cloudInsertRow(table, row){
  const r=await fetch(`${CLOUD.url}/rest/v1/${table}`,{
    method:'POST', headers:{ ...(await _ah()), 'Content-Type':'application/json', Prefer:'return=minimal' }, body:JSON.stringify(row) });
  if(!r.ok && r.status!==409) throw new Error(table+' '+r.status+' '+(await r.text()).slice(0,160));
}
async function syncVisit(visitId){
  const v=await dbGet('visits',visitId); if(!v || v.cloudSynced) return;
  const entries=await entriesFor(v.id), folder=folderName(v);
  for(const e of entries){
    if(!e.filename) continue;
    const rec=await dbGet('blobs',e.id);
    if(rec&&rec.blob) await cloudUpload(`${folder}/${e.filename}`, rec.blob);
  }
  await cloudInsertRow('site_visits', {
    id:v.id, date:v.date, company:v.company, engineer:v.engineer, location:v.location||null,
    gps:v.geo||null, survey:v.survey||{}, key_findings:v.keyFindings||[], outstanding:v.outstanding||[],
    folder, device_id:deviceId(), app_version:CLOUD.version, created_at:new Date(v.createdAt||Date.now()).toISOString() });
  for(const e of entries){
    await cloudInsertRow('site_visit_entries', {
      id:e.id, visit_id:v.id, seq:e.seq||null, time:e.time, category:e.category, note:e.note||null,
      media_type:e.mediaType||null, filename:e.filename||null,
      storage_path:e.filename?`${folder}/${e.filename}`:null, geo:e.geo||null,
      created_at:new Date(e.seq||Date.now()).toISOString() });
  }
  v.cloudSynced=true; v.cloudSyncedAt=Date.now(); await dbPut('visits',v);
}
let _syncing=false;
async function syncAll(){
  if(!cloudEnabled() || !navigator.onLine || _syncing) return {skipped:true};
  _syncing=true; let done=0, fail=0;
  try{
    const pending=(await dbGetAll('visits')).filter(v=>!v.cloudSynced);
    for(const v of pending){
      try{ await syncVisit(v.id); done++; } catch(e){ fail++; console.warn('sync failed', v.id, e.message); }
    }
    return {done, fail, total:pending.length};
  } finally { _syncing=false; }
}

      try{ await cloudLogin(p, role); close(); toast(`Signed in as ${a.label} ✓`); await syncAll(); render(); }
      catch(e){ go.disabled=false; go.textContent='→'; pin.value='';
        showErr(/invalid login credentials/i.test(e.message||'') ? 'Incorrect PIN — try again.' : (e.message||'Sign-in failed')); }
    };
  }

  showPick();
}

/* ---- Team visits (read-only browse of the shared cloud) ---- */
async function renderTeam(){
  setBar('Team visits','All engineers · shared', true);
  $('#backBtn').onclick=()=>go('home');
  if(!cloudEnabled()) return go('home');
  app.innerHTML=`<div class="wrap screen"><div class="empty"><span class="em">☁️</span><div class="small">Loading team visits…</div></div></div>`;
  let rows;
  try{ rows=await cloudListVisits(); }
  catch(e){ app.innerHTML=`<div class="wrap screen"><div class="banner"><span class="b-ic">⚠️</span><div>Couldn't load (${esc(e.message)}). Check connection / sign-in.</div></div><button class="btn subtle block" id="b2" style="margin-top:12px">← Back</button></div>`; $('#b2').onclick=()=>go('home'); return; }
  let html=`<div class="wrap screen"><div class="section-title">${rows.length} visit${rows.length===1?'':'s'} · whole team</div>`;
  if(!rows.length) html+=`<div class="empty"><span class="em">📭</span><div class="small">No visits in the cloud yet.</div></div>`;
  for(const v of rows){
    html+=`<button class="card tap" data-team="${esc(v.id)}" style="display:block;width:100%;text-align:left;font:inherit;color:inherit">
      <div class="ellip" style="font-weight:650;font-size:16px">${esc(v.company||'Untitled')}</div>
      <div class="small muted ellip">${esc(v.date||'')}${v.engineer?' · '+esc(v.engineer):''}${v.location?' · '+esc(v.location):''}</div>
    </button>`;
  }
  html+=`</div>`;
  app.innerHTML=html;
  $$('[data-team]').forEach(b=>b.onclick=()=>{ state.teamVisit=b.dataset.team; go('teamVisit'); });
}
async function renderTeamVisit(){
  const id=state.teamVisit; if(!id) return go('team');
  setBar('Team visit','shared', true);
  $('#backBtn').onclick=()=>go('team');
  app.innerHTML=`<div class="wrap screen"><div class="empty"><span class="em">☁️</span><div class="small">Loading…</div></div></div>`;
  let v, entries;
  try{ v=(await cloudListVisits()).find(x=>x.id===id); entries=await cloudListEntries(id); }
  catch(e){ app.innerHTML=`<div class="wrap screen"><div class="banner"><span class="b-ic">⚠️</span><div>Couldn't load (${esc(e.message)}).</div></div><button class="btn subtle block" id="b3" style="margin-top:12px">← Back</button></div>`; $('#b3').onclick=()=>go('team'); return; }
  if(!v) return go('team');
  const sv=v.survey||{};
  let h=`<div class="wrap screen">
    <div class="card"><div style="font-weight:700;font-size:18px">${esc(v.company||'Untitled')}</div>
      <div class="small muted">${esc(v.date||'')}${v.engineer?' · '+esc(v.engineer):''}</div>
      ${v.location?`<div class="small muted">📍 ${esc(v.location)}</div>`:''}</div>`;
  const kf=v.key_findings||[], os=v.outstanding||[];
  if(kf.length||os.length){ h+=`<div class="card">`;
    if(kf.length){ h+=`<div style="font-weight:650;font-size:13px">Key findings</div>`; kf.forEach(b=>h+=`<div class="small">• ${esc(b)}</div>`); }
    if(os.length){ h+=`<div style="font-weight:650;font-size:13px;margin-top:8px">Outstanding</div>`; os.forEach(b=>h+=`<div class="small">• ${esc(b)}</div>`); }
    h+=`</div>`; }
  const svGroups=SURVEY.map(g=>({g:g.group,items:g.items.filter(it=>(sv[it.k]||'').trim())})).filter(x=>x.items.length);
  if(svGroups.length){ h+=`<div class="section-title">Site survey</div><div class="card">`;
    for(const grp of svGroups){ h+=`<div style="font-weight:650;font-size:13px;margin:8px 0 2px">${esc(grp.g)}</div>`;
      for(const it of grp.items) h+=`<div class="small"><span class="muted">${esc(it.label)}:</span> ${esc(sv[it.k])}</div>`; }
    h+=`</div>`; }
  h+=`<div class="section-title">Captures · ${entries.length}</div>`;
  for(const e of entries){
    h+=`<div class="card"><div class="entry">
      <div class="ph" id="tm-${esc(e.id)}">${e.media_type==='video'?'🎬':(e.media_type?'🖼':'📝')}</div>
      <div class="grow"><div class="time">${esc(e.time||'')}</div><div class="cat">${esc(e.category||'')}</div>
        ${e.note?`<div class="note">${esc(e.note)}</div>`:''}</div>
    </div></div>`;
  }
  h+=`</div>`;
  app.innerHTML=h;
  for(const e of entries){ if(e.media_type && e.storage_path){ cloudMediaUrl(e.storage_path).then(url=>{ const ph=$('#tm-'+e.id); if(!ph||!url) return;
    ph.outerHTML = e.media_type==='video' ? `<video class="thumb" src="${url}" muted playsinline preload="metadata"></video>` : `<img class="thumb" src="${url}" alt="">`; }); } }
}

/* ---------- boot ---------- */
applyScale(getScale());
const _aa=$('#aaBtn'); if(_aa) _aa.onclick=openTextSize;
if('serviceWorker' in navigator){
  // Auto-reload to the new version when an updated service worker takes over.
  // Only reload on a genuine UPDATE (a controller already existed), never on first install.
  const hadController = !!navigator.serviceWorker.controller;
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing || !hadController) return; refreshing=true; window.location.reload();
  });
  window.addEventListener('load', async ()=>{
    try{
      const reg=await navigator.serviceWorker.register('./sw.js');
      reg.update().catch(()=>{});               // check for a new version on every launch
      setInterval(()=>reg.update().catch(()=>{}), 60*60*1000); // and hourly if left open
    }catch(e){}
  });
}
if(navigator.storage && navigator.storage.persist){ navigator.storage.persist().catch(()=>{}); }

render();

/* expose pure helpers for verification/testing */
window.SVC={ slugify, catSlug, entryFilename, folderName, buildMarkdown, crc32, makeZip,

  dbGet, dbGetAll, dbPut, CATEGORIES, go, getScale, applyScale, saveScale, openTextSize,
  visitSize, fmtSize, cloudEnabled, cloudLogin, cloudSignOut, syncAll, syncVisit,
  cloudListVisits, cloudListEntries, cloudMediaUrl, CLOUD };
